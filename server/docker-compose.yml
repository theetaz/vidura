# Vidura self-hosted backend. Postgres stays on the internal network (no host
# port → no clash with the box's other Postgres instances); the API is exposed
# only on 127.0.0.1:8788 for the host nginx to reverse-proxy.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vidura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vidura
    volumes:
      - vidura-pgdata:/var/lib/postgresql/data
      # Applied in filename order on first init (empty volume) only.
      - ./db/better-auth.sql:/docker-entrypoint-initdb.d/00-better-auth.sql:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidura -d vidura"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://vidura:${POSTGRES_PASSWORD}@postgres:5432/vidura
      PORT: "8787"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8788:8787"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://vidura:${POSTGRES_PASSWORD}@postgres:5432/vidura
      # Drop a Netscape-format cookies.txt here to bypass YouTube's bot wall.
      YOUTUBE_COOKIES_FILE: /cookies/youtube.txt
    volumes:
      - ./cookies:/cookies:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bun", "run", "src/worker.ts"]

volumes:
  vidura-pgdata:

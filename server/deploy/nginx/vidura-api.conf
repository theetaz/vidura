# Vidura API — host nginx reverse-proxy vhost for the shared VPS.
#
# Mirrors the box's Cloudflare-proxied :80 pattern (TLS terminates at
# Cloudflare; the origin serves plain HTTP on :80, routed by Host header).
# The Vidura API container binds 127.0.0.1:8788.
#
# Install (one-time, as root on the VPS):
#   cp /opt/vidura/server/deploy/nginx/vidura-api.conf /etc/nginx/sites-available/vidura-api
#   ln -s /etc/nginx/sites-available/vidura-api /etc/nginx/sites-enabled/vidura-api
#   nginx -t && systemctl reload nginx
#
# DNS: vidura-api.nipuntheekshana.com → A → 178.104.111.17 (Cloudflare proxied).

server {
    listen 80;
    listen [::]:80;
    server_name vidura-api.nipuntheekshana.com;

    # Uploaded transcripts / larger chat payloads.
    client_max_body_size 10m;

    # SSE endpoints must not be buffered and need long-lived upstream reads.
    location ~ ^/api/(realtime|chat/send) {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
